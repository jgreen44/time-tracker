<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Time Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      color: #1d1d1f;
    }
    .container { padding: 12px; }
    select, button, input[type="text"], input[type="number"], input[type="datetime-local"] {
      width: 100%;
      padding: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }
    .rate-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .rate-row label { font-size: 12px; color: #666; white-space: nowrap; }
    .rate-row input { margin-bottom: 0; }
    #elapsed {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin: 8px 0;
    }
    #currentEarnings {
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      color: #1a7f37;
      margin-bottom: 8px;
    }
    #startStop.running { background: #ff3b30; color: white; }
    #startStop.stopped { background: #34c759; color: white; }
    h3 { margin: 12px 0 4px; font-size: 12px; color: #666; text-transform: uppercase; }
    .summary-row { display: flex; justify-content: space-between; padding: 2px 0; }
    #addProjectBtn, #exportBtn, #historyBtn, #backBtn { background: #eee; }
    #exportStatus { font-size: 11px; color: #666; text-align: center; min-height: 14px; }
    #historyView { display: none; }
    #historyList { max-height: 440px; overflow-y: auto; }
    .entry-row {
      border-bottom: 1px solid #ddd;
      padding: 6px 0;
    }
    .entry-row .entry-top {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
    }
    .entry-row .entry-meta {
      color: #666;
      font-size: 11px;
      margin: 2px 0;
    }
    .entry-row .field-group {
      margin: 6px 0;
    }
    .entry-row .field-group label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 2px;
    }
    .entry-row .field-group input {
      width: 100%;
      margin-bottom: 0;
      padding: 5px;
      font-size: 12px;
      box-sizing: border-box;
    }
    .entry-row .entry-earnings {
      display: block;
      font-size: 11px;
      color: #1a7f37;
      margin-top: 4px;
    }
    .entry-row .entry-save-status { font-size: 10px; color: #1a7f37; min-height: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container" id="mainView">
    <select id="projectSelect"></select>
    <button id="addProjectBtn">+ Add Project</button>
    <div class="rate-row">
      <label for="rateInput">$/hr</label>
      <input type="number" id="rateInput" min="0" step="0.01" placeholder="0.00" />
    </div>
    <input type="text" id="noteInput" placeholder="What are you working on? (optional)" />
    <div id="elapsed">00:00:00</div>
    <div id="currentEarnings">$0.00</div>
    <button id="startStop" class="stopped">Start</button>
    <h3>Today</h3>
    <div id="summary"></div>
    <h3>Earnings</h3>
    <div class="summary-row"><span>Today</span><span id="earningsToday">$0.00</span></div>
    <div class="summary-row"><span>This week</span><span id="earningsWeek">$0.00</span></div>
    <div class="summary-row"><span>All time</span><span id="earningsAllTime">$0.00</span></div>
    <button id="historyBtn">Edit Past Entries</button>
    <button id="exportBtn">Export to Excel</button>
    <div id="exportStatus"></div>
  </div>
  <div class="container" id="historyView">
    <button id="backBtn">&larr; Back</button>
    <h3>Past Entries</h3>
    <div id="historyList"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
